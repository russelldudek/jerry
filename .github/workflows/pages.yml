name: Build and deploy Jerry candidate campaign

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install artifact dependencies
        run: pip install --disable-pip-version-check pillow weasyprint pypdf

      - name: Normalize and build campaign artifacts
        run: python scripts/build_artifacts.py

      - name: Commit generated and normalized artifacts to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets docs resume.html cover-letter.html interview-brief.html index.html README.md
          if git diff --cached --quiet; then
            echo "Campaign artifacts are current."
          else
            git commit -m "Refresh Jerry campaign artifacts"
            git push
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Record successful deployment
        run: |
          if [ ! -f .deployment-verified ]; then
            printf 'GitHub Pages deployment completed successfully.\nLive site: https://russelldudek.github.io/jerry/\n' > .deployment-verified
            git add .deployment-verified
            git commit -m "Record successful campaign deployment"
            git push
          else
            echo "Deployment proof is already recorded."
          fi
